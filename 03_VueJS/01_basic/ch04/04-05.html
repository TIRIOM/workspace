<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <!-- 2) num 데이터 바인딩 -> 값 입력 시, 데이터 옵션에 작성된 num 값도 변경. -->
      1보다 큰 수: <input type="text" v-model="num" /><br />
      <!-- 여기서는 함수를 "호출"하는 것임으로, ()를 붙여준다. -->
      1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
      1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
      1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return { num: 0 };
        },
        methods: {
          // vue 인스턴스가 사용할 함수를 정의하는 속성
          sum() {
            //sum 함수 정의
            console.log('num : ' + this.num);

            let n = parseInt(this.num);
            if (Number.isNaN(n)) return 0;

            return (n * (n + 1)) / 2;
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
