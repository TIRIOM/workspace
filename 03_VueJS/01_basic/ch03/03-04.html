<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- v-model 디렉티브 
     * 양방향 데이터 바인딩 
     - model 변경이 view에 영향을 주고, view 변경이 model에 영향을 줌
     
     * 형식 
     - 기본형 : <태그명 v-model="속성">
     - 
     -->
    <div id="app">
      <!-- 여기서 값이 바뀌어도 괜찮게 만들어야 함! -->
      <input type="text" v-model="name" />
      <br />
      입력한값: <span>{{name}}</span>
    </div>

    <script src="https://unpkg.com/vue"></script>

    <script>
      // Vue 애플리케이션 인스턴스를 생성하고, 변수 vm에 할당
      const vm = Vue.createApp({
        name: 'App', // 애플리케이션 이름을 app으로 설정
        data() {
          // 컴포넌트의 반응형 데이터를 정의하는 함수

          return { name: '' }; // name이라는 빈 문자열 속성을 가진 객체 반환.
          // -> name 데이터는 v-model 에 의해서 input과 양방향 바인딩 됨.
          // -> input 요소에 값을 변경되면 name 데이터가 업데이트되고,
          // -> name 데이터가 변경되면 input 요소의 값도 업데이트됨.
          // 수정할거면, 속성명을 써야함.
        },
      }).mount('#app');
    </script>
  </body>
</html>
