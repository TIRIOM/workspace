<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- v-model 양방향 데이터 바인딩 
     * 주로 form 요소에서 사용됨.
     - input, textarea, select 요소에서 사용됨.
     
     -->
    <div id="app">
      <div>
        <!-- 왜 label 써도 되나? for 문 없이 써도 되나"? -> 정리할 것  -->
        <h2>취미생활</h2>
        <label><input type="checkbox" v-model="hobby" value="A" /> 운동</label>
        <label><input type="checkbox" v-model="hobby" value="B" /> 독서</label>
        <label><input type="checkbox" v-model="hobby" value="C" /> 음악</label>
        <label><input type="checkbox" v-model="hobby" value="D" /> 댄스</label>
        <label><input type="checkbox" v-model="hobby" value="E" /> 역사</label>
      </div>
      <br />
      <div>
        <h2>상품 분류 선택</h2>
        <select v-model="category">
          <option value="C01">레저</option>
          <option value="C02">가전</option>
          <option value="C03">음식</option>
          <option value="C04">도서</option>
          <option value="C05">주방</option>
        </select>
      </div>
      <hr />
      <!-- 선택 결과 -->
      <!-- 배열.join() : 배열을 문자열로 합치는 함수  -->
      <div>선택한 취미 : {{ hobby.join(', ') }}</div>

      <div>선택한 상품 분류 : {{ category }}</div>
    </div>

    <script src="https://unpkg.com/vue"></script>

    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            hobby: [],
            category: '',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
