<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Ex</title>
  </head>
  <body>
    <div id="app">
      <!-- View : 보여지는 부분 -->
      <!-- vue의 템플릿 문법 : 이중 중괄호(mustache)를 활용한 텍스트 보간법(값을 끼워넣겠다)-->
      <!-- data()에서 반환된 message 속성 값이 여기에 랜더링됨. -->
      <h2>{{message}}</h2>
    </div>

    <!-- vue 라이브러리를 CDN(Content Delivery Network)을 통해 로드하겠다는 뜻-->
    <script src="https://unpkg.com/vue"></script>

    <script>
      /* Model : 비즈니스 로직 결과(데이터) */
      let model = { message: 'Hello Vue3!!!' };

      /* View Model : View에 Model 데이터 연결 */
      const vm = Vue.createApp({
        name: 'App', //어플리케이션 이름 설정
        data() {
          // 컴포넌트의 반응형 데이터 정의
          // 이 함수가 반환하는 객체의 속성들은 Vue의 반응형 시스템에 의해 추적되고, 데이터가 변경될 때 자동으로 뷰가 업데이트됨.
          return model;
        },
      }).mount('#app'); // #app 선택자에 해당하는 dom 요소에 Vue 어플리케이션을 마운트하겠다.
      //mount() 함수는 Vue 어플리케이션이 실제 DOM에 연결하는 지점을 지정 함.
    </script>
  </body>
</html>
