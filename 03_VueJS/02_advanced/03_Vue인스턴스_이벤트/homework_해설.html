<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v1</h1>

      <ul>
        <li
          v-for="post in posts"
          <!-- [개념: v-for]
               배열을 순회하며 <li>를 반복 생성하는 디렉티브.
               "post in posts" → posts 배열의 각 요소를 post라는 이름으로 하나씩 꺼내 사용. -->

          :key="post.no"
          <!-- [개념: :key]
               v-for 사용 시 반드시 필요한 고유 식별자.
               Vue가 배열이 변경될 때 어떤 항목이 바뀌었는지 추적하는 데 사용.
               : (콜론)은 v-bind의 단축 문법 → 동적인 값을 속성에 바인딩할 때 사용. -->

          class="post-item"

          @click="selectPost(post)"
          <!-- [개념: @click]
               클릭 이벤트 핸들러. v-on:click의 단축 문법.
               클릭 시 methods의 selectPost를 호출하고, 현재 순회 중인 post 객체를 인자로 전달. -->
        >
          {{ post.no }}. {{ post.title }}
          <!-- [개념: {{ }}  머스태시(Mustache) 문법]
               data나 methods의 반환값을 HTML에 텍스트로 출력.
               v-for로 꺼낸 post 객체의 no, title 속성을 그대로 출력. -->
        </li>
      </ul>

      <div class="post-content" v-if="selectedPost">
        <!-- [개념: v-if]
             조건이 true일 때만 해당 요소를 DOM에 렌더링.
             selectedPost가 null(falsy)이면 이 div 자체가 DOM에서 제거됨.
             → 게시글을 클릭해 selectedPost에 객체가 담기면 자동으로 화면에 표시됨. -->

        <h3>{{ selectedPost.title }}</h3>
        <p>{{ selectedPost.content }}</p>

        <button @click="closePost">닫기</button>
        <!-- 닫기 클릭 시 closePost 호출 → selectedPost = null → v-if false → div 사라짐 -->
      </div>
    </div>

    <script>
      Vue.createApp({
        data() {
          // [개념: data()]
          // Vue 인스턴스의 상태(state)를 정의하는 곳.
          // 여기서 반환된 값들은 Vue가 "반응형"으로 관리함.
          // → 값이 변경되면 해당 값을 사용하는 화면이 자동으로 업데이트됨. (DOM 직접 조작 불필요)
          return {
            posts: [
              {
                no: 1,
                title: 'Vue.js 기초 배우기',
                content:
                  'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
              },
              {
                no: 2,
                title: '자바스크립트 ES6 문법',
                content:
                  'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
              },
              {
                no: 3,
                title: 'Node.js와 Express',
                content:
                  'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
              },
              {
                no: 4,
                title: 'MongoDB 기본 개념',
                content:
                  'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
              },
              {
                no: 5,
                title: '프론트엔드와 백엔드의 차이',
                content:
                  '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
              },
              {
                no: 6,
                title: '비동기 프로그래밍',
                content:
                  'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
              },
              {
                no: 7,
                title: 'Vue Router 사용법',
                content:
                  'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
              },
              {
                no: 8,
                title: '컴포넌트 기반 개발',
                content:
                  'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
              },
              {
                no: 9,
                title: 'CSS와 SCSS 차이점',
                content:
                  'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
              },
              {
                no: 10,
                title: 'Git과 GitHub 사용법',
                content:
                  'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
              },
            ],

            // 선택된 게시글을 담을 변수.
            // 초기값을 null로 설정 → "아무것도 선택 안 됨" 상태를 표현.
            // null은 falsy 값이므로 v-if="selectedPost"가 false가 되어 상세 div가 숨겨짐.
            selectedPost: null,
          };
        },

        methods: {
          // [개념: methods]
          // 이벤트 발생 시 실행할 함수들을 정의하는 곳.
          // methods 내부에서 data의 값에 접근할 때는 반드시 this.변수명 으로 접근.
          // (Vue가 data를 this에 연결해주기 때문)

          // 목록 클릭 시 호출되는 메서드.
          // 인자로 받은 post 객체를 selectedPost에 저장.
          // → selectedPost가 객체(truthy)가 되므로 v-if가 true → 상세 div 표시됨.
          selectPost(post) {
            this.selectedPost = post;
          },

          // 닫기 버튼 클릭 시 호출되는 메서드.
          // selectedPost를 null로 초기화.
          // → v-if가 false → 상세 div가 DOM에서 제거됨.
          closePost() {
            this.selectedPost = null;
          },
        },
      }).mount('#app');
      // [개념: .mount('#app')]
      // id가 "app"인 요소에 Vue 인스턴스를 연결(마운트).
      // 이 시점부터 해당 div 안에서 v-for, v-if, @click 등 Vue 문법이 동작함.
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        border-bottom: 1px solid #eee;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }
      .arrow {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </body>
</html>
