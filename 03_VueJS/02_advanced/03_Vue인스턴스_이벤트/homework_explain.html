<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v1</h1>
      <!-- 아래의 목록을 완성하세요 -->
      <ul>
        <!-- 1.  v-for를 사용하여 posts 배열의 각 항목을 반복 -->
        <!-- 2. 클릭 이벤트 처리를 위한 @click 이벤트 함수 호출 -->
        <!-- post를 인자로 주는 이유?  -->
        <!-- v-bind : key의 축약식은 :key -->
        <li
          v-for="post in posts"
          :key="post.no"
          class="post-item"
          @click="selectPost(post)"
        >
          {{ post.no }}. {{ post.title }}
        </li>
      </ul>
      <!-- 아래의 div를 완성하세요 -->
      <!-- 3.  선택된 게시글의 내용을 표시하는 div -->
      <!-- <div v-if="selectedPost ! = null" class="post-content">
        
        줄이는 방법이 있다. 
        
        - falsy 값 : false / 0 / "" / null / undefined /NaN 
        - truthy 값 : 그외의 모든 값 , 추가로 [빈 배열]과 {빈 객체}도 truthy 값으로 간주-->
      <div v-if="selectedPost" class="post-content">
        <h3>{{ selectedPost.title }}</h3>
        <p>{{ selectedPost.content }}</p>
        <!-- 5. closePost 메서드 호출 -> 정의 필요 -->
        <button @click="closePost">닫기</button>
      </div>
    </div>

    <script>
      Vue.createApp({
        data() {
          return {
            posts: [
              {
                no: 1,
                title: 'Vue.js 기초 배우기',
                content:
                  'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
              },
              {
                no: 2,
                title: '자바스크립트 ES6 문법',
                content:
                  'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
              },
              {
                no: 3,
                title: 'Node.js와 Express',
                content:
                  'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
              },
              {
                no: 4,
                title: 'MongoDB 기본 개념',
                content:
                  'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
              },
              {
                no: 5,
                title: '프론트엔드와 백엔드의 차이',
                content:
                  '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
              },
              {
                no: 6,
                title: '비동기 프로그래밍',
                content:
                  'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
              },
              {
                no: 7,
                title: 'Vue Router 사용법',
                content:
                  'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
              },
              {
                no: 8,
                title: '컴포넌트 기반 개발',
                content:
                  'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
              },
              {
                no: 9,
                title: 'CSS와 SCSS 차이점',
                content:
                  'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
              },
              {
                no: 10,
                title: 'Git과 GitHub 사용법',
                content:
                  'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
              },
            ],
            // 아래에 필요한 데이터를 추가하세요.
            // 2. 선택된 게시글을 담을 빈 변수 추가
            selectedPost: null,
          };
        },
        // 아래에 필요한 메서드를 추가하세요.
        // 4. 게시글 선택과 닫기 기능을 처리하는 메서드 추가
        //  this를 사용해서 selectedPost 변수를 업데이트하는 메서드 작성
        methods: {
          selectPost(post) {
            this.selectedPost = post;
          },
          //   6. closePost 메서드 정의
          //   this를 사용해서 selectedPost 변수를 null로 업데이트하는 메서드 작성
          closePost() {
            this.selectedPost = null;
          },
        },
      }).mount('#app');
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        border-bottom: 1px solid #eee;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }
      .arrow {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </body>
</html>
