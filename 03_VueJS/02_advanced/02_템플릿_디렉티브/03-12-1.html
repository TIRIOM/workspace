<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03-12-2 v-for 디렉티브</title>
    <style>
      /* 테이블 테두리 겹침 제거 */
      table { border-collapse: collapse; width: 600px; }

      /* 헤더: 보라색 배경, 흰색 글씨 */
      thead tr { background-color: purple; color: white; }

      /* 셀 공통 스타일 */
      th, td { border: 1px solid #ccc; padding: 8px 16px; text-align: center; }

      /* 번호 열: 주황색 글씨 */
      td:first-child { color: orange; }
    </style>
  </head>
  <body>
    <!-- Vue 앱이 마운트될 루트 엘리먼트 -->
    <div id="app">
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody>
          <!--
            v-for="contact in contacts"
              - contacts 배열의 각 요소를 contact 변수로 하나씩 꺼내 반복 렌더링
            :key="contact.no"
              - Vue가 각 행을 고유하게 식별하기 위한 키 바인딩 (필수)
              - 리스트가 변경될 때 DOM을 효율적으로 업데이트하기 위해 사용
          -->
          <tr v-for="contact in contacts" :key="contact.no">
            <td>{{ contact.no }}</td>    <!-- 번호 -->
            <td>{{ contact.name }}</td>  <!-- 이름 -->
            <td>{{ contact.tel }}</td>   <!-- 전화번호 -->
          </tr>
        </tbody>
      </table>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            /*
              contacts: 연락처 목록 배열
              각 객체는 no(번호), name(이름), tel(전화번호) 필드를 가짐
            */
            contacts: [
              { no: 1011, name: 'RM',    tel: '010-3456-8299' },
              { no: 1012, name: '정국',  tel: '010-3456-8298' },
              { no: 1013, name: '제이홉', tel: '010-3456-8297' },
              { no: 1014, name: '슈가',  tel: '010-3456-8296' },
            ],
          };
        },
      }).mount('#app'); // #app 엘리먼트에 Vue 인스턴스를 마운트
    </script>
  </body>
</html>
