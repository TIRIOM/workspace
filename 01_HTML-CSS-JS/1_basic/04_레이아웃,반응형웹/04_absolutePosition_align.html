<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: red;
      }
      div {
        position: relative;
      }
      div#container {
        width: 500px;
        height: 300px;
        background-color: orange;
        position: absolute;

        top: 50%;
        left: 50%;

        /* 1. 방법 : 상대 크기  */
        /* transform: translate(-50%, -50%); */

        /* 2. 방법 : 절대 위치 */
        margin-left: -250px;
        margin-top: -150px;
      }
    </style>
  </head>
  <body>
    <div id="container"><h1>요소의 중앙 배치</h1></div>
  </body>
</html>
