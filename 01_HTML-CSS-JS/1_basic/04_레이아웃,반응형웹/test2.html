<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        background: lightcyan;
        width: 800px;
        height: 800px;
      }
      ul {
        background: lime;
        width: 800px;
        height: 100px;
        padding: 2px;
      }
      li {
        display: inline-block;
        padding: 10px;
        text-align: center;
      }
      li:nth-child(2n) {
        background: yellow;
      }
      li:nth-child(2n + 1) {
        background: cyan;
      }
    </style>
  </head>
  <body>
    <div>
      <ul>
        <li>회원가입</li>
        <li>제품정보</li>
        <li>게시판</li>
        <li>장바구니</li>
      </ul>
    </div>
  </body>
</html>
