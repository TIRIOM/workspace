<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- STEP 2 : CSS 파일 연결 -->
    <!-- css 연결은 link 태그를 사용함 -->
    <link rel="stylesheet" href="KB_page.css" />
    <!-- STEP 3 : 스타일  작성 -->
    <!-- kb_page.css에서 진행  -->
  </head>
  <body>
    <main>
      <!-- STEP 1 : 일단 크게 헤더 / nav/ section의 3분할로 나눠서 작성.  -->

      <!-- part 1 : 헤더 -->
      <header>
        <!-- 1-1: 클릭 시 메인페이지로 이동하는 로고 -->
        <section>
          <a href="#">
            <img src="KB.png" alt="KB Bank Logo" id="main-logo" />
          </a>
        </section>
        <!-- 1-2: 검색창 -->
        <section>
          <!-- 두번 감싸서 수정 용이하게 함.  -->
          <section class="search-erea">
            <!-- #은 임시  -->
            <form action="#" name="search-form">
              <!-- form 태그 내부의 input이 서버로 전달된다.  -->

              <!-- name 속성은 서버로 전달되는 input의 이름을 정의함! 없으면 전달 안됨! -->
              <!-- form 태그 내부의 input이 서버로 전달된다. 
                단, input의" name 속성" 이 존재해야만 서버로 전달됨 -->

              <!-- fieldset은 form 태그 내부에서 input을 종류별로 묶는 용도로 많이 사용함.  -->
              <fieldset>
                <!-- 속성 1 : placeholder는 입력창에 표시되는 힌트 텍스트 -->
                <!-- 속성 2 : auto complete : off : 자동완성 비활성화 -->
                <input
                  type="text"
                  name="query"
                  id="query"
                  placeholder="검색어를 입력해주세요."
                  autocomplete="off"
                />
                <button id="search-btn" type="submit">검색</button>
              </fieldset>
            </form>
          </section>
        </section>
        <!-- 1-3: 날씨 -->
        <section>날씨</section>
      </header>

      <!-- part 2 : 네비게이션 -->
      <nav>
        <ul>
          <!-- 보통 네비게이션은 ul안에 li 를 넣는 방식을 취함.  -->
          <li><a href="#">KB 은행</a></li>
          <li><a href="#">KB 카드</a></li>
          <li><a href="#">KB 손보</a></li>
          <li><a href="#">KB 증권</a></li>
        </ul>
      </nav>
      <!-- part 3 : 컨텐츠 -->
      <!-- 참고로, 컨텐츠 섹션은 2분할로 해야 함으로, section or div 쓰면 되는데 편의상 section 씀  -->
      <section class="content">
        <section><h1>주요 컨텐츠 작성 부분</h1></section>
        <section><h1>사이드 메뉴</h1></section>
      </section>

      <!-- part 4 : 푸터 -->
      <footer>
        <p>Copyright &copy; KB It's your life 606 class</p>
        <article>
          <!-- 여기 전부 block 말고 inline 속성임. (a, span) -->
          <a href="#">프로젝트 소개</a>
          <span>|</span>
          <a href="#">이용약관</a>
          <span>|</span>
          <a href="#">개인정보처리방침</a>
          <span>|</span>
          <a href="#">고객센터</a>
        </article>
      </footer>
    </main>
  </body>
</html>
