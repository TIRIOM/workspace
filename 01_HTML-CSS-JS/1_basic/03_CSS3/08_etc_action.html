<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 반응 선택자 : 요소의 상태에 따라 스타일이 적용되는 선택자 */

        color: red;
      }
      a:active {
        color: blue;
      }
    </style>
  </head>

    <h1>반응 선택자</h1>
  </body>
</html>
