<!doctype html>
<html>
  <head>
    <title>DOM Basic</title>
    <script>
      // 이벤트를 연결합니다.
      window.onload = function () {
        // 속성을 지정합니다.
        document.body.setAttribute('data-custom', 'value');
        // 요소.setAttribute("속성명", "속성값")
        // 해당 요소에 속성명 ='속성값'으로 추가
        //-> <body date-custom ="value"

        // 속성을 추출합니다.
        let dataCustom = document.body.getAttribute('data-custom');
        //요소.getAttribute('속석명'')-> 속성값 얻어오기
        alert(dataCustom);
      };
    </script>
  </head>
  <body>
    <div>practive</div>

    <script>
      // 1. div 태그에 id 속성 추가 - id명 : practice

      document.getElementsByTagName('div')[0].style.color = 'red';

      // document.getElementsByTagName()
      // -> 얻어오는 요소가 하나여도 배열에 담긴다..!

      //요소 잘 담겼는지 콘솔 확인해보기.
      // console.log(document.getElementsByTagName('div'))

      document.querySelector('div').setAttribute('id', 'practice');
      // 2. div 태그에 class 속성 추가 - class명 : pr

      document.querySelector('div').setAttribute('class', 'pr');
    </script>
  </body>
</html>
