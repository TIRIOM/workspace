<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // window.onload : 브라우저가 HTML 페이지를 전부 읽은 뒤 실행
      // → 이 안에 코드를 작성해야 <body>의 태그를 찾을 수 있음
      window.onload = function () {

        // querySelectorAll('h1')
        // → 페이지 안의 모든 <h1> 태그를 한 번에 골라
        //   배열처럼 생긴 목록(NodeList)으로 돌려줌
        let array = document.querySelectorAll('h1');

        // array.length : 목록 안에 있는 요소 개수 (여기서는 3)
        // i = 0 부터 시작해서 하나씩 증가하며 반복
        for (let i = 0; i < array.length; i++) {

          // array[i] : i번째 <h1> 요소 하나를 꺼냄
          const element = array[i];

          // 텍스트 내용을 'From JavaScript'로 바꿈
          element.innerHTML = 'From JavaScript';

          // 배경색을 빨간색으로 지정
          element.style.backgroundColor = 'red';

          // 글자색을 노란색으로 지정
          element.style.color = 'yellow';
        }
      };
    </script>
  </head>
  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>
