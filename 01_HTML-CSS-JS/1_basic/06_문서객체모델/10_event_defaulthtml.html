<!doctype html>
<html>
  <head>
    <title>Traditional Event - Default Event</title>
    <script>
      // 이벤트를 연결합니다.
      window.onload = function () {
        // 문서 객체를 선택합니다.
        let button = document.getElementById('button');
        // 이벤트를 연결합니다.
        button.onclick = function () {
          // 기본 이벤트를 제거합니다.
          return false;
        };
      };
    </script>
  </head>
  <body>
    <a id="button" href="http://hanbit.co.kr">버튼</a>
    <a id="button1" href="http://hanbit.co.kr">버튼</a>

    <script>
      // 표준 이벤트 모델로 작성
      document.getElementById('button1').addEventListener('click', function (event) { //event or e 쓰면 됨. 
        // return false;
        console.log(event); //이벤트와 관련한 정보 
        console.log(event.targer); //이벤트가 발생한 요소

        event.preventDefault(); //이벤트 기본 동작 취소 
        //a 태그의 기본 이벤트를 제거함 
      });
    </script>
  </body>
</html>
