<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>함수 funcrion</h3>
    <pre>
        //함수 선언 
        function 함수명 ([매개변수]){ 
            // [매개변수] : 생략 가능 

            // 함수 정의 
            return 반환값 ;
        }

        함수명 (); // 함수 호출
    </pre>
    <script>
      function F(x) {
        // x 는 매개체
        return 6 + x; // 함수 호출부 : 함수를 호출한 곳으로 값 반환
      }
      F(); //함수 호출

      alert(6);
      alert(F()); // 함수 호출
    </script>
  </body>
</html>
