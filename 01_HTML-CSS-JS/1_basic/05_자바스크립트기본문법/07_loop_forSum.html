<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let sum = 0;
      //0부터 100까지 반복하는 반복문
      for (let i = 0; i <= 100; i++) {
        // sum = sum +i
        sum += i;
      }

      // alert(i);
      // Uncaught ReferenceError: i is not defined
      // -> i 는 for 문 안에서만 사용 가능하다.

      alert(sum);
    </script>
  </body>
</html>
