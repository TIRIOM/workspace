<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width= , initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }
      .box:nth-child(1) {
        background-color: red;
        left: 10px;
        top: 10px;
        z-index: 100;
      }
      .box.box:nth-child(2) {
        background-color: green;
        left: 50px;
        top: 50px;
        z-index: 50;
      }
      .box.box:nth-child(3) {
        background-color: blue;
        left: 100px;
        top: 100px;
        z-index: 10;
      }
      div {
        position: relative;
      }
      body > div {
        width: 300px;
        height: 100px;
        border: 1px solid black;
        overflow: hidden; /* overflow : 요소의 넘치는 부분을 어떻게 처리할지 */
      }
    </style>
  </head>
  <body>
    <h1>Lorem ipsum dolor amet</h1>
    <div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h1>Lorem ipsum dolor amet</h1>
  </body>
</html>
